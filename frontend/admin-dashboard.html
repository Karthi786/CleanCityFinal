<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — MakkalSevi</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        body {
            background-color: #F8F9FB;
        }

        :root {
            --sidebar-width: 0px;
        }

        .dash-main {
            margin-left: 0 !important;
            padding-top: 90px;
        }

        /* ── Floating Nav Bar Overrides ── */
        .nav-island-container {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            pointer-events: none;
        }

        .nav-island {
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1300px;
            height: 68px;
            padding: 0 16px 0 24px;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: var(--shadow-md);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-island.scrolled {
            height: 60px;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: var(--shadow-lg);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .nav-island .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .nav-island .logo-icon {
            font-size: 1.35rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
            list-style: none;
        }

        .nav-link-item {
            padding: 8px 18px;
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 99px;
            position: relative;
            cursor: pointer;
            transition: all var(--transition);
        }

        .nav-link-item:hover, .nav-link-item.active {
            color: var(--primary);
        }

        .nav-link-item.active {
            background: rgba(176, 0, 0, 0.05);
        }

        .nav-link-item.active::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 3px;
            background: var(--primary);
            border-radius: 99px;
            box-shadow: 0 2px 6px var(--primary-glow);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dash-content {
            padding: 32px 40px !important;
            max-width: 1300px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px !important;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 2.2rem !important;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .verify-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(15, 23, 42, 0.06);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }

        .verify-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: rgba(176, 0, 0, 0.12);
        }

        .verify-info h3 {
            font-family: var(--font-display);
            font-weight: 800;
            color: var(--text);
        }

        .verify-actions {
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>
    <!-- Hidden elements for backward compatibility of js sidebar/hamburger methods -->
    <div style="display: none;">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div id="sidebar-name"></div>
            <div id="sidebar-avatar"></div>
            <button id="logout-btn-hidden"></button>
        </aside>
        <button id="hamburger"></button>
        <button id="mobile-logout-btn"></button>
        <div class="tab-list">
            <button id="tab-overview-btn"></button>
            <button id="tab-verifications-btn"></button>
            <button id="tab-users-btn"></button>
            <span id="tab-badge"></span>
        </div>
    </div>

    <div class="dash-layout">
        <main class="dash-main">
            <!-- Floating Nav Island -->
            <div class="nav-island-container">
                <nav class="nav-island">
                    <div class="logo">
                        <span>MakkalSevi</span>
                    </div>

                    <!-- Top Doc Navigation Links -->
                    <ul class="nav-links">
                        <li>
                            <a class="nav-link-item active" href="#" id="nav-overview" onclick="event.preventDefault(); document.getElementById('tab-overview-btn').click();">
                                Analytics
                            </a>
                        </li>
                        <li>
                            <a class="nav-link-item" href="#" id="nav-verify" onclick="event.preventDefault(); document.getElementById('tab-verifications-btn').click();">
                                Verifications
                                <span id="pending-badge" class="badge badge-red" style="margin-left:6px; display:none; padding: 2px 6px; border-radius:99px; font-size:0.75rem;">0</span>
                            </a>
                        </li>
                        <li>
                            <a class="nav-link-item" href="#" id="nav-users" onclick="event.preventDefault(); document.getElementById('tab-users-btn').click();">
                                All Users
                            </a>
                        </li>
                    </ul>

                    <div class="nav-actions">
                        <!-- Mobile Burger Button -->
                        <button class="mobile-burger" id="mobile-menu-btn" aria-label="Menu">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="3" y1="12" x2="21" y2="12"></line>
                                <line x1="3" y1="6" x2="21" y2="6"></line>
                                <line x1="3" y1="18" x2="21" y2="18"></line>
                            </svg>
                        </button>

                        <!-- User Info Profile Circle & Action Buttons -->
                        <div style="display: flex; align-items: center; gap: 10px; border-left: 1px solid var(--border); padding-left: 12px;">
                            <div class="user-avatar-sidebar"
                                style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--primary); color: white; font-family: var(--font-display); font-weight: 800; font-size: 0.95rem; box-shadow: 0 4px 10px rgba(176,0,0,0.2);"
                                id="sidebar-avatar-visible">
                                A
                            </div>
                            <button id="logout-btn" class="btn btn-ghost btn-sm" style="padding: 6px 12px; font-size: 0.85rem; border-radius: 99px;">Sign Out</button>
                        </div>
                    </div>
                </nav>

                <!-- Mobile Drawer Navigation -->
                <div class="mobile-nav-overlay" id="mobile-nav-overlay">
                    <div class="mobile-nav-drawer" id="mobile-nav-drawer">
                        <div class="mobile-drawer-header">
                            <div class="logo">
                                <span>MakkalSevi</span>
                            </div>
                            <button class="mobile-drawer-close" id="mobile-nav-close">✕</button>
                        </div>
                        <div class="mobile-drawer-nav">
                            <a href="#" class="mobile-drawer-link active" id="drawer-overview">
                                <span class="drawer-icon">📊</span> Analytics
                            </a>
                            <a href="#" class="mobile-drawer-link" id="drawer-verify">
                                <span class="drawer-icon">✅</span> Verifications
                            </a>
                            <a href="#" class="mobile-drawer-link" id="drawer-users">
                                <span class="drawer-icon">👥</span> All Users
                            </a>
                        </div>
                        <div class="mobile-drawer-footer">
                            <div class="mobile-drawer-user">
                                <div class="mobile-drawer-user-avatar" id="drawer-avatar">A</div>
                                <div class="mobile-drawer-user-info">
                                    <div class="mobile-drawer-user-name" id="drawer-name">Admin</div>
                                    <div class="mobile-drawer-user-role">Administrator</div>
                                </div>
                            </div>
                            <button class="btn btn-outline" style="width: 100%; border-radius: 99px;" id="drawer-logout-btn">Logout</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="dash-content animate-in">
                <div class="page-header animate-in stagger-1">
                    <div>
                        <h2 class="page-title">Management Console</h2>
                    </div>
                </div>

                <!-- Analytics Tab -->
                <div id="tab-overview" class="tab-pane active">
                    <div class="grid grid-3 mb-8 animate-in stagger-2" style="grid-template-columns: 1fr;">
                        <div class="stat-card" style="max-width: 420px; border-color: rgba(255, 208, 0, 0.25);">
                            <div>
                                <div class="stat-label">Pending User Verifications</div>
                                <div class="stat-value" id="s-pending">—</div>
                            </div>
                            <div class="stat-icon yellow" style="background: var(--warning-light); color: var(--warning);">⏳</div>
                        </div>
                    </div>
                </div>

                <!-- Verifications Tab -->
                <div id="tab-verifications" class="tab-pane" style="display:none;">
                    <div style="margin-bottom: 24px;">
                        <h3 style="font-family: var(--font-display); font-weight: 800; font-size: 1.25rem; color: var(--text);">User Verification Requests</h3>
                    </div>
                    
                    <div id="users-verification-pane">
                        <div id="pending-users-list" class="space-y-4"></div>
                    </div>
                </div>

                <!-- All Users Tab -->
                <div id="tab-users" class="tab-pane" style="display:none;">
                    <div style="margin-bottom: 24px;">
                        <h3 style="font-family: var(--font-display); font-weight: 800; font-size: 1.25rem; color: var(--text);">All Registered Users</h3>
                    </div>
                    <div id="all-users-list" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { guardPage } from './js/router.js';
        import { logout } from './js/auth.js';
        import { usersAPI } from './js/api.js';
        import { toast } from './js/toast.js';
        import { initDashboardDrawer, syncDrawerActive } from './js/dashboard-nav.js';

        const ROLE_LABELS = { USER: 'Citizen', TAMILNADU_CORPORATION: 'Tamilnadu Corp.', TNEB: 'TNEB', POLICE: 'Police', COLLECTOR: 'Collector', ADMIN: 'Admin' };

        const user = guardPage(['ADMIN']);
        if (!user) throw new Error('Unauthorized');

        document.getElementById('sidebar-name').textContent = user.name;
        document.getElementById('sidebar-avatar').textContent = user.name.charAt(0).toUpperCase();
        document.getElementById('sidebar-avatar-visible').textContent = user.name.charAt(0).toUpperCase();
        document.getElementById('logout-btn').addEventListener('click', logout);
        document.getElementById('mobile-logout-btn').addEventListener('click', logout);

        // Sidebar compatibility
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        document.getElementById('hamburger').addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });

        // Tabs
        const tabs = ['overview', 'verifications', 'users'];
        const drawerByTab = { overview: 'drawer-overview', verifications: 'drawer-verify', users: 'drawer-users' };
        function switchTab(name) {
            sessionStorage.setItem('adminDashboardTab', name);
            tabs.forEach(t => {
                const pane = document.getElementById('tab-' + t);
                pane.style.display = t === name ? 'block' : 'none';
                
                const navLink = document.getElementById('nav-' + (t === 'overview' ? 'overview' : (t === 'verifications' ? 'verify' : 'users')));
                if (navLink) {
                    navLink.classList.toggle('active', t === name);
                }
            });
            syncDrawerActive(drawerByTab[name]);
        }

        document.getElementById('tab-overview-btn').addEventListener('click', () => { switchTab('overview'); loadData(); });
        document.getElementById('tab-verifications-btn').addEventListener('click', () => { switchTab('verifications'); loadPending(); });
        document.getElementById('tab-users-btn').addEventListener('click', () => { switchTab('users'); loadAllUsers(); });

        async function loadData() {
            try {
                const stats = (await usersAPI.getStats()).stats;

                document.getElementById('s-pending').textContent = stats.pendingApprovals;

                // Badges
                const pendingBadge = document.getElementById('pending-badge');
                pendingBadge.textContent = stats.pendingApprovals;
                pendingBadge.style.display = stats.pendingApprovals > 0 ? 'inline-flex' : 'none';

            } catch (err) {
                toast.error('Failed to load stats', err.message);
            }
        }

        async function loadPending() {
            const container = document.getElementById('pending-users-list');
            container.innerHTML = '<div class="loading-page" style="min-height:200px;"><div class="spinner"></div></div>';
            try {
                const data = await usersAPI.getPending();
                const users = data.users || [];
                if (users.length === 0) {
                    container.innerHTML = `<div class="empty-state" style="padding: 40px; text-align: center; border-radius:24px; border:1.5px dashed var(--border); background: var(--bg-card);"><div class="empty-state-icon" style="font-size: 2.5rem; margin-bottom:12px;">✅</div><h3 style="font-family: var(--font-display); font-weight:800; font-size:1.2rem; color:var(--text);">All clear!</h3><p style="color:var(--text-muted); font-size:0.9rem;">No pending verification requests.</p></div>`;
                    return;
                }
                container.innerHTML = users.map(u => `
                  <div class="verify-card animate-in" id="vcard-${u.id}">
                    <div class="verify-info">
                      <h3 style="font-size:1.1rem; font-weight:800;">${u.name}</h3>
                      <p class="text-muted text-sm" style="margin:4px 0;">📧 ${u.email}</p>
                      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px; align-items:center;">
                        <span class="badge badge-yellow" style="font-size:0.75rem; padding:3px 10px; border-radius:99px;">${ROLE_LABELS[u.role] || u.role}</span>
                        <span class="text-xs text-muted" style="font-size:0.78rem;">Registered: ${new Date(u.created_at).toLocaleDateString()}</span>
                      </div>
                    </div>
                    <div class="verify-actions">
                      <button class="btn btn-primary btn-sm" onclick="approveUser('${u.id}', 'approved')">✅ Approve</button>
                      <button class="btn btn-danger btn-sm" onclick="approveUser('${u.id}', 'rejected')">❌ Reject</button>
                    </div>
                  </div>
                `).join('');
            } catch (err) {
                toast.error('Failed to load pending users', err.message);
                container.innerHTML = `<div class="empty-state"><p>${err.message}</p></div>`;
            }
        }

        window.approveUser = async (id, status) => {
            try {
                await usersAPI.verify(id, status);
                toast.success(status === 'approved' ? 'User Approved ✅' : 'User Rejected ❌', `Account has been ${status}.`);
                document.getElementById('vcard-' + id)?.remove();
                loadData();
            } catch (err) {
                toast.error('Update Failed', err.message);
            }
        };

        async function loadAllUsers() {
            const container = document.getElementById('all-users-list');
            container.innerHTML = '<div class="loading-page" style="min-height:200px;"><div class="spinner"></div></div>';
            try {
                const data = await usersAPI.getAll();
                const users = data.users || [];
                if (users.length === 0) {
                    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">👥</div><h3>No users yet.</h3></div>`;
                    return;
                }
                container.innerHTML = `
                  <div class="table-wrap">
                      <table class="table">
                        <thead><tr>
                          <th>Name</th>
                          <th>Email</th>
                          <th>Role / Dept</th>
                          <th>Status</th>
                          <th>Joined</th>
                          <th>Actions</th>
                        </tr></thead>
                        <tbody>${users.map((u, i) => `
                          <tr style="border-bottom:1px solid var(--border);">
                            <td style="font-weight:700; color: var(--text);">${u.name}</td>
                            <td>${u.email}</td>
                            <td>
                              <div style="display:flex;flex-direction:column;gap:4px;">
                                  <span class="badge ${u.role === 'ADMIN' ? 'badge-red' : 'badge-green'}" style="width:fit-content; font-size: 0.72rem; padding: 3px 10px; border-radius: 99px;">${ROLE_LABELS[u.role] || u.role}</span>
                                  ${u.department ? `<span style="font-size:0.75rem;color:var(--text-muted); font-weight: 500; margin-top:2px;">🏢 ${u.department}</span>` : ''}
                              </div>
                            </td>
                            <td>
                              <span class="badge ${u.verification_status === 'approved' ? 'badge-green' : u.verification_status === 'rejected' ? 'badge-red' : 'badge-yellow'}" style="font-size: 0.72rem; padding: 3px 10px; border-radius: 99px;">
                                ${u.verification_status}
                              </span>
                            </td>
                            <td style="font-size: 0.82rem; color: var(--text-muted);">${new Date(u.created_at).toLocaleDateString()}</td>
                            <td>
                              <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')" style="padding: 4px 8px; font-size: 0.75rem;">Delete</button>
                            </td>
                          </tr>
                        `).join('')}</tbody>
                      </table>
                  </div>
                `;
            } catch (err) {
                toast.error('Failed to load users', err.message);
            }
        }

        window.deleteUser = async (id) => {
            if (!confirm('Are you sure you want to delete this user?')) return;
            try {
                await usersAPI.delete(id);
                toast.success('User Deleted', 'User has been removed successfully.');
                loadAllUsers();
                loadData();
            } catch (err) {
                toast.error('Delete Failed', err.message);
            }
        };

        // Scroll effect for island navbar
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.nav-island');
            if (window.scrollY > 20) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        initDashboardDrawer({
            linkMap: {
                'drawer-overview': 'nav-overview',
                'drawer-verify': 'nav-verify',
                'drawer-users': 'nav-users'
            },
            onLogout: logout
        });

        const savedAdminTab = sessionStorage.getItem('adminDashboardTab');
        const initialAdminTab = tabs.includes(savedAdminTab) ? savedAdminTab : 'overview';
        document.getElementById({
            overview: 'tab-overview-btn',
            verifications: 'tab-verifications-btn',
            users: 'tab-users-btn'
        }[initialAdminTab]).click();
    </script>
</body>

</html>
