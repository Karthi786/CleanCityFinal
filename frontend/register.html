<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — MakkalKural</title>
    <meta name="description"
        content="Register for MakkalKural to report civic issues or manage municipal services in Tamilnadu." />
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Language Script -->
    <script type="module" src="js/i18n.js"></script>
    <style>
        body {
            background: #F8F9FB;
        }

        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            background: radial-gradient(ellipse at 20% 80%, rgba(176, 0, 0, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 208, 0, 0.08) 0%, transparent 55%),
                linear-gradient(160deg, #F8F9FB 0%, #FFFFFF 50%, #F8F9FB 100%);
        }

        .auth-header-row {
            width: 100%;
            max-width: 520px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .auth-card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(15, 23, 42, 0.06);
            border-radius: 30px;
            box-shadow: var(--shadow-md);
            padding: 40px;
            transition: all var(--transition);
            animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .auth-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(176, 0, 0, 0.15);
        }

        .auth-card-header {
            margin-bottom: 30px;
        }

        .auth-card-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }

        .auth-card-header p {
            color: var(--text-muted);
            font-size: 0.92rem;
        }

        .auth-card-footer {
            margin-top: 24px;
            text-align: center;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.35rem;
            color: var(--primary);
            text-decoration: none;
        }

        .logo-icon {
            font-size: 1.45rem;
        }

        .role-option {
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.4);
        }

        .role-option:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        .role-option.selected {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .role-option input {
            display: none;
        }

        .role-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .role-label {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
        }

        .role-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        #dept-group {
            animation: slideInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* ── OTP Section Styles ── */
        .otp-email-highlight {
            color: var(--primary);
            font-weight: 700;
        }

        .otp-input-wrapper {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        #otp {
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 6px;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            padding: 14px 20px;
            border: 2px solid var(--border);
            border-radius: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        #otp:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            outline: none;
        }

        .otp-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .otp-timer {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .resend-btn {
            background: transparent;
            color: var(--primary);
            padding: 6px 12px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }

        .resend-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .resend-btn:not(:disabled):hover {
            opacity: 0.8;
        }

        .otp-info-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(176, 0, 0, 0.06);
            border: 1px solid rgba(176, 0, 0, 0.12);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .otp-info-badge .badge-icon {
            font-size: 1.2rem;
        }

        .otp-info-badge .badge-text {
            font-size: 0.88rem;
            color: var(--text);
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-header-row">
            <a href="index.html" class="logo">
                <span>MakkalKural</span>
            </a>
            <select class="select lang-switcher"
                style="padding: 6px 12px; font-size: 0.85rem; border-radius: 99px; background: rgba(15,23,42,0.04); border: 1px solid rgba(15,23,42,0.08); color: var(--text); cursor: pointer; outline: none;">
                <option value="en">English</option>
                <option value="ta">தமிழ்</option>
            </select>
        </div>

        <div class="auth-card">
            <div class="auth-card-header">
                <h1 data-i18n="auth_register_title">Join the Movement 🌿</h1>
                <p data-i18n="app_title">Register to report civic issues or manage city services</p>
            </div>

            <div class="auth-card-body">
                <form id="register-form" class="form-stack" novalidate autocomplete="off">
                    <!-- ═══════════════════════════════════════════════ -->
                    <!-- Registration Fields (hidden after OTP is sent) -->
                    <!-- ═══════════════════════════════════════════════ -->
                    <div id="registration-fields">
                        <div class="form-group">
                            <label class="label" for="name" data-i18n="lbl_fullname">Full Name</label>
                            <input id="name" type="text" class="input" placeholder="e.g. Arjun Kumar" required
                                autocomplete="name" />
                        </div>

                        <div class="form-group">
                            <label class="label" for="email" data-i18n="lbl_email">Email Address</label>
                            <input id="email" type="email" class="input" placeholder="name@example.com" required
                                autocomplete="email" />
                            <div id="email-error" style="color: #D32F2F; font-size: 0.8rem; margin-top: 4px; display: none;"></div>
                        </div>

                        <div class="form-group">
                            <label class="label" for="password" data-i18n="lbl_pwd">Password</label>
                            <input id="password" type="password" class="input" placeholder="At least 6 characters"
                                minlength="6" required autocomplete="new-password" />
                        </div>

                        <div class="form-group">
                            <label class="label">Select Your Role</label>
                            <div class="space-y-4" id="role-options" style="display: flex; flex-direction: column; gap: 12px;">
                                <label class="role-option selected" data-role="USER">
                                    <input type="radio" name="role" value="USER" checked />
                                    <span class="role-icon">🏙️</span>
                                    <div>
                                        <div class="role-label" data-i18n="role_cit">Citizen</div>
                                        <div class="role-desc">Report civic issues and support community causes</div>
                                    </div>
                                </label>
                                <label class="role-option" data-role="COLLECTOR">
                                    <input type="radio" name="role" value="COLLECTOR" />
                                    <span class="role-icon">🛡️</span>
                                    <div>
                                        <div class="role-label" data-i18n="role_col">District Collector</div>
                                        <div class="role-desc">Oversee all departments and city-wide issue resolution</div>
                                    </div>
                                </label>
                                <label class="role-option" data-role="MLA">
                                    <input type="radio" name="role" value="MLA" />
                                    <span class="role-icon">🗣️</span>
                                    <div>
                                        <div class="role-label">Member of Legislative Assembly</div>
                                        <div class="role-desc">Manage issues and campaigns for your constituency</div>
                                    </div>
                                </label>
                                <label class="role-option" data-role="DEPT">
                                    <input type="radio" name="role" value="DEPT" />
                                    <span class="role-icon">🏛️</span>
                                    <div>
                                        <div class="role-label" data-i18n="role_dept">Department Staff</div>
                                        <div class="role-desc">Manage issues assigned to your municipal department</div>
                                    </div>
                                </label>
                                <label class="role-option" data-role="ADMIN">
                                    <input type="radio" name="role" value="ADMIN" />
                                    <span class="role-icon">👑</span>
                                    <div>
                                        <div class="role-label">System Administrator</div>
                                        <div class="role-desc">Manage users, verify accounts, and oversee the platform</div>
                                    </div>
                                </label>
                                <label class="role-option" data-role="COMMISSIONER">
                                    <input type="radio" name="role" value="COMMISSIONER" />
                                    <span class="role-icon">🏢</span>
                                    <div>
                                        <div class="role-label">District Commissioner</div>
                                        <div class="role-desc">Monitor issues, analytics, heatmap, and departments within assigned district</div>
                                    </div>
                                </label>
                                <label class="role-option" data-role="CM">
                                    <input type="radio" name="role" value="CM" />
                                    <span class="role-icon">🏵️</span>
                                    <div>
                                        <div class="role-label">Chief Minister</div>
                                        <div class="role-desc">State-level oversight — view analytics and performance across all districts</div>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <!-- Department sub-selector (shown only for DEPT role) -->
                        <div class="form-group" id="dept-group" style="display:none;">
                            <label class="label" for="department" data-i18n="lbl_department">Select Department</label>
                            <select id="department" class="select">
                                <option value="">— Choose your department —</option>
                                <option value="TAMILNADU_CORPORATION" data-i18n="cat_waste">Tamilnadu Corporation (Waste / Water / Roads)</option>
                                <option value="TNEB" data-i18n="cat_eb">TNEB — Electrical</option>
                                <option value="POLICE" data-i18n="cat_police">Tamilnadu Police</option>
                            </select>
                        </div>

                        <!-- MLA description field (shown only for MLA role) -->
                        <div class="form-group" id="description-group" style="display:none;">
                            <label class="label" for="description">MLA Description</label>
                            <textarea id="description" class="input" placeholder="Enter brief profile description" rows="3"></textarea>
                        </div>

                        <!-- Phone number (shown for all roles) -->
                        <div class="form-group">
                            <label class="label" for="phone_number">Mobile Number</label>
                            <input id="phone_number" type="tel" class="input" placeholder="e.g. 9876543210" required />
                            <div id="phone-error" style="color: #D32F2F; font-size: 0.8rem; margin-top: 4px; display: none;"></div>
                        </div>

                        <!-- Profile Photo Upload (shown for non-citizen roles) -->
                        <div class="form-group" id="profile-photo-group" style="display:none;">
                            <label class="label" for="profile-photo">Profile Photo Upload</label>
                            <input id="profile-photo" type="file" class="input" accept="image/*" />
                        </div>

                        <!-- District selector (shown for all roles) -->
                        <div class="form-group">
                            <label class="label" for="district">District</label>
                            <select id="district" class="select" required>
                                <option value="">— Choose your district —</option>
                            </select>
                        </div>

                        <!-- Constituency selector -->
                        <div class="form-group" id="constituency-group">
                            <label class="label" for="constituency">Constituency</label>
                            <select id="constituency" class="select" required>
                                <option value="">— Choose constituency —</option>
                            </select>
                        </div>

                        <!-- Citizen-specific fields (DOB) — shown only for USER role -->
                        <div id="citizen-fields" style="display: flex; flex-direction: column; gap: 16px;">
                            <div class="form-group">
                                <label class="label" for="dob">Date of Birth</label>
                                <input id="dob" type="date" class="input" required />
                            </div>
                        </div>

                        <button id="register-btn" type="submit" class="btn btn-primary btn-full btn-lg"
                            style="margin-top: 24px;">
                            <span id="register-btn-text" data-i18n="btn_register">✨ Create Account</span>
                            <div id="register-spinner" class="spinner spinner-sm" style="display:none; border-top-color: white;"></div>
                        </button>
                    </div>

                    <!-- ═══════════════════════════════════════════════ -->
                    <!-- OTP Verification Section (shown after OTP sent) -->
                    <!-- ═══════════════════════════════════════════════ -->
                    <div id="otp-section" style="display: none; flex-direction: column; gap: 16px;">
                        <div class="otp-info-badge">
                            <span class="badge-icon">📧</span>
                            <span class="badge-text">
                                We sent a 6-digit verification code to
                                <strong id="otp-email-display" class="otp-email-highlight"></strong>
                            </span>
                        </div>

                        <div class="form-group">
                            <label class="label" for="otp">Enter Verification Code</label>
                            <input id="otp" type="text" class="input" placeholder="• • • • • •" maxlength="6"
                                inputmode="numeric" pattern="\d{6}" autocomplete="one-time-code" required />
                        </div>

                        <button id="verify-btn" type="button" class="btn btn-primary btn-full btn-lg">
                            <span id="verify-btn-text">✅ Verify & Create Account</span>
                            <div id="verify-spinner" class="spinner spinner-sm" style="display:none; border-top-color: white;"></div>
                        </button>

                        <div class="otp-controls">
                            <span id="otp-timer" class="otp-timer"></span>
                            <button id="resend-btn" type="button" class="resend-btn" disabled>
                                🔄 Resend OTP
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="auth-card-footer">
                <p style="font-size: 0.9rem; color: var(--text-muted);">
                    <span data-i18n="lbl_has_account">Already have an account? Sign in</span>
                    <a href="login.html" class="font-bold" style="color: var(--primary); font-weight: 700; text-decoration: none;">&nbsp;→</a>
                </p>
            </div>
        </div>

        <p style="margin-top: 32px; opacity: 0.6; font-size: 0.8rem; color: var(--text-muted);">
            © 2024 Tamilnadu District Administration
        </p>
    </div>

    <script type="module">
        import { redirectIfLoggedIn } from './js/router.js';
        import { register, saveSession } from './js/auth.js';
        import { toast } from './js/toast.js';

        redirectIfLoggedIn();

        // ══════════════════════════════════════════════
        // API Base URL — auto-detect local vs production
        // ══════════════════════════════════════════════
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5001/api'
            : 'https://cleancityfinal.onrender.com/api';

        // ══════════════════════════════════════════════
        // District & Constituency Loading
        // ══════════════════════════════════════════════
        let districtsData = {};
        const districtSelect = document.getElementById('district');
        const constituencySelect = document.getElementById('constituency');

        async function loadDistricts() {
            try {
                const response = await fetch(`${API_BASE}/citizen/districts`);
                if (!response.ok) throw new Error("Failed to load districts mapping");
                districtsData = await response.json();
                
                // Sort and populate district dropdown
                Object.keys(districtsData).sort().forEach(dist => {
                    const option = document.createElement('option');
                    option.value = dist;
                    option.textContent = dist;
                    districtSelect.appendChild(option);
                });
            } catch (err) {
                console.error("Districts mapping load error:", err);
                toast.error("Network Error", "Could not load district-to-constituency mapping.");
            }
        }

        loadDistricts();

        // Populate constituency based on district choice
        districtSelect.addEventListener('change', () => {
            const district = districtSelect.value;
            constituencySelect.innerHTML = '<option value="">— Choose constituency —</option>';
            
            if (district && districtsData[district]) {
                districtsData[district].sort().forEach(con => {
                    const option = document.createElement('option');
                    option.value = con;
                    option.textContent = con;
                    constituencySelect.appendChild(option);
                });
            }
        });

        // ══════════════════════════════════════════════
        // Role Selector — Show/hide role-specific fields
        // ══════════════════════════════════════════════
        const roleOptions = document.querySelectorAll('.role-option');
        const deptGroup = document.getElementById('dept-group');
        const citizenFields = document.getElementById('citizen-fields');
        const constGroup = document.getElementById('constituency-group');
        const descGroup = document.getElementById('description-group');
        const profilePhotoGroup = document.getElementById('profile-photo-group');
        let selectedRole = 'USER';

        roleOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                roleOptions.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                opt.querySelector('input').checked = true;
                selectedRole = opt.dataset.role;
                
                // Department dropdown — only for DEPT role
                deptGroup.style.display = selectedRole === 'DEPT' ? 'flex' : 'none';
                
                // Citizen-specific fields (DOB) — only for USER role
                citizenFields.style.display = selectedRole === 'USER' ? 'flex' : 'none';

                // Profile photo — only for non-citizen roles
                profilePhotoGroup.style.display = selectedRole !== 'USER' ? 'flex' : 'none';
                
                // Collectors, Departments, and CM do not need a constituency
                if (selectedRole === 'COLLECTOR' || selectedRole === 'DEPT' || selectedRole === 'CM' || selectedRole === 'COMMISSIONER') {
                    constGroup.style.display = 'none';
                    document.getElementById('constituency').required = false;
                } else {
                    constGroup.style.display = 'flex';
                    document.getElementById('constituency').required = true;
                }

                // Only MLAs need a description
                if (selectedRole === 'MLA') {
                    descGroup.style.display = 'flex';
                    document.getElementById('description').required = true;
                } else {
                    descGroup.style.display = 'none';
                    document.getElementById('description').required = false;
                }
            });
        });

        // ══════════════════════════════════════════════
        // Uniqueness Validation (blur events)
        // ══════════════════════════════════════════════
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone_number');
        const emailError = document.getElementById('email-error');
        const phoneError = document.getElementById('phone-error');

        emailInput.addEventListener('blur', async () => {
            const email = emailInput.value.trim();
            if (!email) {
                emailError.style.display = 'none';
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/citizen/check-uniqueness`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if (!response.ok) {
                    const data = await response.json();
                    emailError.textContent = data.error || 'Email already registered';
                    emailError.style.display = 'block';
                } else {
                    emailError.style.display = 'none';
                }
            } catch (e) {
                console.error("Uniqueness check error:", e);
            }
        });

        phoneInput.addEventListener('blur', async () => {
            const phone = phoneInput.value.trim();
            if (!phone) {
                phoneError.style.display = 'none';
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/citizen/check-uniqueness`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number: phone })
                });
                if (!response.ok) {
                    const data = await response.json();
                    phoneError.textContent = data.error || 'Phone number already registered';
                    phoneError.style.display = 'block';
                } else {
                    phoneError.style.display = 'none';
                }
            } catch (e) {
                console.error("Uniqueness check error:", e);
            }
        });

        // ══════════════════════════════════════════════
        // UI State Elements
        // ══════════════════════════════════════════════
        const form = document.getElementById('register-form');
        const btn = document.getElementById('register-btn');
        const btnText = document.getElementById('register-btn-text');
        const spinner = document.getElementById('register-spinner');

        const registrationFields = document.getElementById('registration-fields');
        const otpSection = document.getElementById('otp-section');
        const otpEmailDisplay = document.getElementById('otp-email-display');
        const otpInput = document.getElementById('otp');
        const verifyBtn = document.getElementById('verify-btn');
        const verifyBtnText = document.getElementById('verify-btn-text');
        const verifySpinner = document.getElementById('verify-spinner');
        const resendBtn = document.getElementById('resend-btn');

        let countdownInterval;
        let lastRegistrationPayload = {};

        function setLoading(on) {
            btn.disabled = on;
            btnText.style.display = on ? 'none' : 'inline-flex';
            spinner.style.display = on ? 'block' : 'none';
        }

        function setVerifyLoading(on) {
            verifyBtn.disabled = on;
            verifyBtnText.style.display = on ? 'none' : 'inline-flex';
            verifySpinner.style.display = on ? 'block' : 'none';
        }

        // ══════════════════════════════════════════════
        // Resend OTP Timer (60-second cooldown)
        // ══════════════════════════════════════════════
        function startResendTimer() {
            clearInterval(countdownInterval);
            let timeRemaining = 60;
            const timerEl = document.getElementById('otp-timer');
            resendBtn.disabled = true;

            timerEl.textContent = `Resend available in ${timeRemaining}s`;

            countdownInterval = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                     clearInterval(countdownInterval);
                     timerEl.textContent = '';
                     resendBtn.disabled = false;
                } else {
                     timerEl.textContent = `Resend available in ${timeRemaining}s`;
                }
            }, 1000);
        }

        // ══════════════════════════════════════════════
        // Form Submit Handler
        // ══════════════════════════════════════════════
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const phone_number = document.getElementById('phone_number').value.trim();
            const district = document.getElementById('district').value;
            const constituency = (selectedRole !== 'COLLECTOR' && selectedRole !== 'DEPT' && selectedRole !== 'CM' && selectedRole !== 'COMMISSIONER') ? document.getElementById('constituency').value : null;
            const dept = document.getElementById('department').value;
            const description = selectedRole === 'MLA' ? document.getElementById('description').value.trim() : null;
            const photoInput = document.getElementById('profile-photo');

            // ── Basic validation for all roles ──
            if (!name || !email || !password || !phone_number || !district) {
                toast.error('Missing Fields', 'Please fill in all required fields.');
                return;
            }
            if (selectedRole !== 'COLLECTOR' && selectedRole !== 'DEPT' && selectedRole !== 'CM' && selectedRole !== 'COMMISSIONER' && !constituency) {
                toast.error('Missing Fields', 'Please select your constituency.');
                return;
            }
            if (selectedRole === 'MLA' && !description) {
                toast.error('Missing Fields', 'Please provide an MLA description.');
                return;
            }
            if (password.length < 6) {
                toast.error('Weak Password', 'Password must be at least 6 characters.');
                return;
            }

            // ══════════════════════════════════════════
            // NON-CITIZEN REGISTRATION (Direct via auth API)
            // Collector, Department Staff, MLA, Admin
            // ══════════════════════════════════════════
            if (selectedRole !== 'USER') {
                if (selectedRole === 'DEPT' && !dept) {
                    toast.error('Select Department', 'Please choose your department.');
                    return;
                }

                let finalRole = selectedRole;
                if (selectedRole === 'DEPT') finalRole = dept;

                // Read profile photo as base64
                let profile_photo = null;
                if (photoInput && photoInput.files && photoInput.files[0]) {
                    const file = photoInput.files[0];
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    await new Promise(res => reader.onload = res);
                    profile_photo = reader.result;
                }

                setLoading(true);
                try {
                    const payload = { 
                        name, email, password, role: finalRole, department: dept || null,
                        phone_number, district, constituency, profile_photo, description
                    };
                    const data = await register(payload);
                    const redirect = (data.redirect || '').replace(/^\//, '');
                    if (redirect === 'pending.html') {
                        toast.info('Account Pending', 'Your account is awaiting admin approval.');
                        setTimeout(() => { window.location.href = 'pending.html'; }, 1000);
                    } else {
                        toast.success('Welcome!', 'Account created successfully.');
                        setTimeout(() => { window.location.href = redirect; }, 800);
                    }
                } catch (err) {
                    toast.error('Registration Failed', err.message);
                } finally {
                    setLoading(false);
                }
                return;
            }

            // ══════════════════════════════════════════
            // CITIZEN REGISTRATION (OTP Verification Flow)
            // Step 1: Validate → Send OTP → Show OTP modal
            // ══════════════════════════════════════════
            const dob = document.getElementById('dob').value;

            if (!dob) {
                toast.error('Missing Fields', 'Please enter your date of birth.');
                return;
            }

            // Client-side age validation
            const birthDate = new Date(dob);
            const today = new Date();
            if (birthDate > today) {
                toast.error('Invalid Date of Birth', 'Date of birth cannot be in the future.');
                return;
            }
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            if (age < 18) {
                toast.error('Age Limit', 'You must be at least 18 years old to register.');
                return;
            }

            // Phone format check
            const phoneRegex = /^[6-9]\d{9}$/;
            if (!phoneRegex.test(phone_number)) {
                toast.error('Invalid Phone', 'Must be a valid 10-digit Indian phone number.');
                return;
            }

            // Store payload for resend and verify
            lastRegistrationPayload = { name, email, password, dob, phone_number, district, constituency };

            setLoading(true);
            try {
                const response = await fetch(`${API_BASE}/citizen/register-request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(lastRegistrationPayload)
                });
                
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Request failed');
                }

                toast.success('Verification Required', 'OTP sent successfully to your email.');
                otpEmailDisplay.textContent = email;
                
                // Switch from registration form → OTP verification section
                registrationFields.style.display = 'none';
                otpSection.style.display = 'flex';
                
                // Start 60-second resend cooldown timer
                startResendTimer();

                // Auto-focus the OTP input
                setTimeout(() => otpInput.focus(), 300);
            } catch (err) {
                toast.error('Registration Request Failed', err.message);
            } finally {
                setLoading(false);
            }
        });

        // ══════════════════════════════════════════════
        // OTP Verification Handler
        // Step 2: Verify OTP → Create Account → Redirect
        // ══════════════════════════════════════════════
        verifyBtn.addEventListener('click', async () => {
            const otpVal = otpInput.value.trim();
            if (!otpVal || otpVal.length !== 6) {
                toast.error('Invalid OTP', 'Please enter a 6-digit verification code.');
                return;
            }

            // Validate OTP is numeric only
            if (!/^\d{6}$/.test(otpVal)) {
                toast.error('Invalid OTP', 'Verification code must contain only numbers.');
                return;
            }

            setVerifyLoading(true);
            try {
                const response = await fetch(`${API_BASE}/citizen/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: lastRegistrationPayload.email,
                        otp: otpVal
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Verification failed');
                }

                // Success! Save session and redirect
                toast.success('Email Verified!', 'Email verified successfully. Your account has been created.');
                saveSession(data.token, data.user);
                
                setTimeout(() => {
                    window.location.href = 'citizen-dashboard.html';
                }, 1200);
            } catch (err) {
                toast.error('Verification Failed', err.message);
            } finally {
                setVerifyLoading(false);
            }
        });

        // ══════════════════════════════════════════════
        // Resend OTP Handler (Dedicated Endpoint)
        // Uses /api/citizen/resend-otp instead of re-submitting full form
        // ══════════════════════════════════════════════
        resendBtn.addEventListener('click', async () => {
            resendBtn.disabled = true;
            try {
                const response = await fetch(`${API_BASE}/citizen/resend-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: lastRegistrationPayload.email })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Resend failed');
                }

                toast.success('OTP Resent', 'A new verification code has been sent to your email.');
                otpInput.value = ''; // Clear old OTP input
                otpInput.focus();
                startResendTimer();
            } catch (err) {
                toast.error('Resend Failed', err.message);
                resendBtn.disabled = false;
            }
        });

        // ══════════════════════════════════════════════
        // OTP Input — Auto-filter to digits only
        // ══════════════════════════════════════════════
        otpInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
        });

        // Allow Enter key to trigger verification
        otpInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyBtn.click();
            }
        });
    </script>
</body>
