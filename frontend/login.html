<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — MakkalKural</title>
    <meta name="description"
        content="Sign in to your MakkalKural account to report civic issues and manage city services." />
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Language Script -->
    <script type="module" src="js/i18n.js"></script>
    <style>
        body {
            background: #F8F9FB;
        }

        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: radial-gradient(ellipse at 20% 80%, rgba(176, 0, 0, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 208, 0, 0.08) 0%, transparent 55%),
                linear-gradient(160deg, #F8F9FB 0%, #FFFFFF 50%, #F8F9FB 100%);
        }

        .auth-header-row {
            width: 100%;
            max-width: 440px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(15, 23, 42, 0.06);
            border-radius: 30px;
            box-shadow: var(--shadow-md);
            padding: 40px;
            transition: all var(--transition);
            animation: slideInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .auth-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(176, 0, 0, 0.15);
        }

        .auth-card-header {
            margin-bottom: 30px;
        }

        .auth-card-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }

        .auth-card-header p {
            color: var(--text-muted);
            font-size: 0.92rem;
        }

        .auth-card-footer {
            margin-top: 24px;
            text-align: center;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.35rem;
            color: var(--primary);
            text-decoration: none;
        }

        .logo-icon {
            font-size: 1.45rem;
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-header-row">
            <a href="index.html" class="logo" style="display:flex;align-items:center;gap:10px;"><img class="logo-icon" src="makkal-sevi-logo.png" alt="MakkalKural Logo" style="width:36px;height:36px;border-radius:10px;object-fit:contain;" /><span>MakkalKural</span></a>
            <select class="select lang-switcher"
                style="padding: 6px 12px; font-size: 0.85rem; border-radius: 99px; background: rgba(15,23,42,0.04); border: 1px solid rgba(15,23,42,0.08); color: var(--text); cursor: pointer; outline: none;">
                <option value="en">English</option>
                <option value="ta">தமிழ்</option>
            </select>
        </div>

        <div class="auth-card">
            <div class="auth-card-header" style="text-align: center;">
                <img src="makkal-sevi-logo.png" alt="Makkal Kural Logo" style="width: 100px; height: auto; margin: 0 auto 16px; display: block;" />
                <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 4px;">MAKKAL KURAL</h2>
                <p style="font-size: 0.95rem; color: var(--text-muted); margin-bottom: 24px;">Citizen Issues Platform</p>
                <h1 data-i18n="auth_login_title" style="margin-bottom: 8px;">Welcome Back 👋</h1>
                <p data-i18n="app_title" style="margin-bottom: 0;">Sign in to access your civic dashboard</p>
            </div>

            <div class="auth-card-body">
                <form id="login-form" class="form-stack" novalidate autocomplete="off">
                    <div class="form-group">
                        <label class="label" for="email" data-i18n="lbl_email">Email Address</label>
                        <input id="email" type="email" class="input" placeholder="name@example.com" required
                            autocomplete="new-password" />
                    </div>

                    <div class="form-group">
                        <label class="label" for="password" data-i18n="lbl_pwd">Password</label>
                        <input id="password" type="password" class="input" placeholder="Your password" required
                            autocomplete="new-password" />
                    </div>

                    <button id="login-btn" type="submit" class="btn btn-primary btn-full btn-lg"
                        style="margin-top: 10px;">
                        <span id="login-btn-text" data-i18n="btn_signin">🔑 Sign In</span>
                        <div id="login-spinner" class="spinner spinner-sm" style="display:none; border-top-color: white;"></div>
                    </button>
                </form>
            </div>

            <div class="auth-card-footer">
                <p style="font-size: 0.9rem; color: var(--text-muted);">
                    <span data-i18n="lbl_no_account">Don't have an account? Sign up</span>
                    <a href="register.html" class="font-bold" style="color: var(--primary); font-weight: 700; text-decoration: none;">&nbsp;→</a>
                </p>
            </div>
        </div>

        <p style="margin-top: 32px; opacity: 0.6; font-size: 0.8rem; color: var(--text-muted);">
            © 2024 Tamilnadu District Administration
        </p>
    </div>

    <script type="module">
        import { redirectIfLoggedIn } from './js/router.js';
        import { login } from './js/auth.js';
        import { toast } from './js/toast.js';

        redirectIfLoggedIn();

        // Clear fields on every load to prevent autofill interference
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        });
        // Also clear immediately since module scripts run deferred
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';

        const form = document.getElementById('login-form');
        const btn = document.getElementById('login-btn');
        const btnText = document.getElementById('login-btn-text');
        const spinner = document.getElementById('login-spinner');

        function setLoading(on) {
            btn.disabled = on;
            btnText.style.display = on ? 'none' : 'inline-flex';
            spinner.style.display = on ? 'block' : 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                toast.error('Missing Fields', 'Please enter your email and password.');
                return;
            }

            setLoading(true);
            try {
                const data = await login(email, password);
                toast.success('Welcome back!', `Signed in successfully.`);
                // Strip leading slash — Live Server serves from a subfolder, not root
                const redirect = (data.redirect || '').replace(/^\//, '');
                setTimeout(() => { window.location.href = redirect; }, 800);
            } catch (err) {
                const errData = err.data || {};
                if (errData.status === 'pending') {
                    toast.warning('Pending Approval', 'Your account is awaiting admin approval.');
                    setTimeout(() => { window.location.href = 'pending.html'; }, 1200);
                } else {
                    toast.error('Login Failed', err.message || 'Invalid email or password.');
                }
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
